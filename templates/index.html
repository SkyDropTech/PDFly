<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFly - Image to PDF Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            yellow: '#EAB308',
                            black: '#171717',
                            gray: '#FAFAFA'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-brand-gray text-brand-black font-sans min-h-screen flex flex-col">

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="bg-brand-yellow w-8 h-8 rounded flex items-center justify-center font-bold text-brand-black">P</div>
                <span class="font-bold text-xl tracking-tight">PDFly</span>
            </div>
            <div class="flex items-center gap-4 text-sm font-medium">
                <a href="#" class="hover:text-brand-yellow transition-colors">Log In</a>
                <a href="#" class="bg-brand-black text-white px-4 py-2 rounded hover:bg-gray-800 transition-colors">Sign Up</a>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col relative">

        <div id="landing-view" class="flex-grow flex flex-col items-center justify-center px-4">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-center">Image to PDF Converter</h1>
            <p class="text-gray-500 mb-10 text-center max-w-lg">Convert your images into a high-quality PDF document instantly. Fast, secure, and easy to use.</p>
            
            <input type="file" id="file-input" multiple accept="image/png, image/jpeg, image/jpg, image/webp" class="hidden">
            
            <button onclick="document.getElementById('file-input').click()" 
                class="bg-brand-yellow hover:bg-yellow-400 text-brand-black font-bold text-lg py-5 px-12 rounded-lg shadow-lg flex items-center gap-3 transition-transform transform hover:-translate-y-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 border-2 border-brand-black rounded-full" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                ADD FILE(S)
            </button>
            <p class="text-sm text-gray-400 mt-4">or drag & drop images here</p>
        </div>

        <div id="editor-view" class="hidden flex-grow flex flex-col md:flex-row w-full max-w-7xl mx-auto p-4 gap-6 h-[calc(100vh-4rem)]">
            
            <div class="flex-grow bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <span class="font-semibold" id="file-count">0 Files Selected</span>
                    <button onclick="document.getElementById('file-input').click()" class="text-sm bg-brand-black text-white px-3 py-1 rounded hover:bg-gray-800 flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        Add More
                    </button>
                </div>
                
                <div id="image-grid" class="flex-grow p-6 overflow-y-auto custom-scrollbar flex flex-wrap gap-6 items-start justify-center bg-gray-50">
                    </div>
            </div>

            <div class="w-full md:w-80 flex-shrink-0 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
                <div class="p-5 border-b border-gray-100">
                    <h2 class="text-xl font-bold text-center">PDF Converter</h2>
                </div>
                
                <div class="p-5 flex-grow flex flex-col gap-6 overflow-y-auto custom-scrollbar">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">File Name</label>
                        <input type="text" id="pdf-filename" value="document.pdf" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-yellow focus:border-transparent transition-colors">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Page Size</label>
                        <div class="flex flex-col gap-2">
                            <button class="setting-btn active border-2 border-brand-yellow font-semibold py-2 rounded text-sm w-full text-left px-4" data-group="size">Original size</button>
                            <button class="setting-btn border-2 border-gray-200 hover:border-gray-300 py-2 rounded text-sm w-full text-left px-4 text-gray-600" data-group="size">A4</button>
                            <button class="setting-btn border-2 border-gray-200 hover:border-gray-300 py-2 rounded text-sm w-full text-left px-4 text-gray-600" data-group="size">US Letter</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Orientation</label>
                        <div class="flex rounded-md shadow-sm border border-gray-200">
                            <button class="setting-btn active flex-1 py-2 text-sm border-r border-gray-200 bg-gray-100 font-semibold text-brand-black" data-group="orientation">Auto</button>
                            <button class="setting-btn flex-1 py-2 text-sm border-r border-gray-200 text-gray-500 hover:bg-gray-50" data-group="orientation">Portrait</button>
                            <button class="setting-btn flex-1 py-2 text-sm text-gray-500 hover:bg-gray-50" data-group="orientation">Landscape</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Margin</label>
                        <div class="flex rounded-md shadow-sm border border-gray-200">
                            <button class="setting-btn active flex-1 py-2 text-sm border-r border-gray-200 bg-gray-100 font-semibold text-brand-black" data-group="margin">None</button>
                            <button class="setting-btn flex-1 py-2 text-sm border-r border-gray-200 text-gray-500 hover:bg-gray-50" data-group="margin">Small</button>
                            <button class="setting-btn flex-1 py-2 text-sm text-gray-500 hover:bg-gray-50" data-group="margin">Big</button>
                        </div>
                    </div>
                </div>

                <div class="p-5 border-t border-gray-100 bg-gray-50 rounded-b-xl">
                    <button id="convert-btn" onclick="handleConvert()" class="w-full bg-brand-yellow hover:bg-yellow-400 text-brand-black font-bold text-lg py-4 rounded-lg shadow transition-colors">
                        CONVERT TO PDF
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const landingView = document.getElementById('landing-view');
        const editorView = document.getElementById('editor-view');
        const imageGrid = document.getElementById('image-grid');
        const fileCountText = document.getElementById('file-count');
        const pdfFileNameInput = document.getElementById('pdf-filename');

        let selectedFiles = [];

        // Handle File Selection
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            selectedFiles = [...selectedFiles, ...files];
            
            landingView.classList.add('hidden');
            editorView.classList.remove('hidden');
            editorView.classList.add('flex'); 

            updateGrid();
        });

        // Update the image grid UI
        function updateGrid() {
            imageGrid.innerHTML = '';
            fileCountText.innerText = `${selectedFiles.length} File(s) Selected`;

            if(selectedFiles.length > 0 && pdfFileNameInput.value === "document.pdf") {
                const baseName = selectedFiles[0].name.split('.')[0];
                pdfFileNameInput.value = `${baseName}_converted`;
            }

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const html = `
                        <div class="relative group flex flex-col items-center bg-white p-2 rounded shadow-sm border border-gray-200 hover:shadow-md transition-shadow">
                            <span class="absolute -top-3 -left-3 bg-gray-800 text-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full z-10">${index + 1}</span>
                            <div class="w-40 h-40 flex items-center justify-center overflow-hidden bg-gray-100 rounded mb-2">
                                <img src="${e.target.result}" class="max-w-full max-h-full object-contain" alt="preview">
                            </div>
                            <span class="text-xs text-gray-600 truncate w-40 text-center" title="${file.name}">${file.name}</span>
                            
                            <button onclick="removeFile(${index})" class="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600 shadow">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>
                    `;
                    imageGrid.insertAdjacentHTML('beforeend', html);
                }
                reader.readAsDataURL(file);
            });
        }

        // Remove a file from the array
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            if (selectedFiles.length === 0) {
                removeAllFiles();
            } else {
                updateGrid();
            }
        }

        // Handle Settings Selection UI
        document.querySelectorAll('.setting-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                const group = e.target.getAttribute('data-group');
                document.querySelectorAll(`.setting-btn[data-group="${group}"]`).forEach(btn => {
                    btn.classList.remove('active', 'font-semibold', 'bg-gray-100', 'text-brand-black', 'border-brand-yellow');
                    btn.classList.add('text-gray-500', 'border-gray-200');
                    if(group === 'size') btn.classList.remove('border-2', 'border-brand-yellow');
                });
                
                e.target.classList.remove('text-gray-500');
                if(group === 'size') {
                    e.target.classList.add('border-2', 'border-brand-yellow', 'font-semibold', 'text-brand-black');
                } else {
                    e.target.classList.add('bg-gray-100', 'font-semibold', 'text-brand-black');
                }
            });
        });

        // The real API call to FastAPI
        async function handleConvert() {
            const finalFileName = document.getElementById('pdf-filename').value;
            const convertBtn = document.getElementById('convert-btn');
            
            if (selectedFiles.length === 0) {
                alert("Please add some images first.");
                return;
            }

            // Change button to show progress
            const originalBtnText = convertBtn.innerHTML;
            convertBtn.innerHTML = "Converting... Please wait";
            convertBtn.disabled = true;
            convertBtn.classList.add('opacity-75', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('filename', finalFileName);
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            try {
                // Send the data to your backend!
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Tell the browser to download the file directly to your system
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = finalFileName.endsWith('.pdf') ? finalFileName : finalFileName + '.pdf';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(downloadUrl);
                    
                    removeAllFiles();
                } else {
                    const errorData = await response.json();
                    alert("Conversion failed: " + (errorData.error || "Unknown error from server"));
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while communicating with the server.");
            } finally {
                // Restore the button
                convertBtn.innerHTML = originalBtnText;
                convertBtn.disabled = false;
                convertBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        // Helper to reset everything back to the start page
        function removeAllFiles() {
            selectedFiles = [];
            editorView.classList.add('hidden');
            editorView.classList.remove('flex');
            landingView.classList.remove('hidden');
            pdfFileNameInput.value = "document.pdf";
        }
    </script>
</body>
</html>
